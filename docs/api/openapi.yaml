openapi: 3.0.3
info:
  title: Smart Order Routing Engine API
  version: 1.0.0
servers:
  - url: http://localhost:8082
paths:
  /api/v1/health:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/routes:
    post:
      summary: Route order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Route decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/routes/{routeId}:
    get:
      summary: Get route status
      parameters:
        - name: routeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteStatus"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/destinations/metrics:
    post:
      summary: Update destination metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationMetric"
      responses:
        "204":
          description: Metrics updated
components:
  schemas:
    RouteRequest:
      type: object
      required: [orderId, symbol, side, quantity]
      properties:
        orderId:
          type: string
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: integer
    RouteResponse:
      type: object
      properties:
        routeId:
          type: string
        destination:
          type: string
        reason:
          type: string
    RouteStatus:
      type: object
      properties:
        routeId:
          type: string
        status:
          type: string
          enum: [SENT, FAILED, RETRIED]
        destination:
          type: string
    DestinationMetric:
      type: object
      required: [destination, latencyMs, errorRate]
      properties:
        destination:
          type: string
        latencyMs:
          type: integer
        errorRate:
          type: number
          format: double
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP]
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
